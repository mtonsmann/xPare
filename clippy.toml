# Clippy thresholds for the anti-slop complexity gates (see [workspace.lints.clippy]
# in Cargo.toml). These are mechanical ceilings against AI-generated bloat: they fail
# `cargo clippy -D warnings` (and therefore `cargo xtask ci` / CI), they are not advisory.
#
# The whole workspace passes these today. Raise a threshold only with a deliberate,
# documented decision — and prefer splitting the function instead. Never silence a hit
# with a blanket `#![allow(...)]`; if a single function is a justified exception, scope
# the allow to that function with a `// reason:` comment.

# `cognitive_complexity`: a measure of how hard a function is to follow (nested branches,
# short-circuits, loops). 25 is clippy's default; the tree clears it with room to spare.
#
# CAVEAT: `cognitive_complexity` is a clippy *nursery* lint, and `rust-toolchain.toml`
# floats the `stable` channel — so a future stable could rescore an unchanged function
# over this threshold and break `-D warnings` CI on an unrelated PR. If that happens,
# split the function (preferred) or nudge this threshold with a documented reason; do not
# silence it with a crate-level allow.
cognitive-complexity-threshold = 25

# `too_many_arguments` (on by default in the `complexity` group): a long parameter list
# is usually a missing struct. 7 is the default ceiling; stated here to make it explicit.
too-many-arguments-threshold = 7
