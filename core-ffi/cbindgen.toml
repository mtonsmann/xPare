# cbindgen configuration for the frozen SafetyStrip C ABI.
# The generated header (core-ffi/include/safetystrip.h) is checked in and is the
# source of truth; `cargo xtask check-abi` fails CI if code and header drift.
language = "C"
header = "/* SafetyStrip C ABI — the frozen, language-neutral boundary between the\n   Rust core and native shells. Any change here is a compatibility event. */"
autogen_warning = "/* GENERATED by cbindgen — do not edit by hand. Run `cargo xtask gen-header`. */"
include_guard = "SAFETYSTRIP_FFI_H"
documentation = true
documentation_style = "doxy"
cpp_compat = true
style = "both"
usize_is_size_t = true

[enum]
# Emit unambiguous, namespaced C constants (e.g. SS_STATUS_OK) rather than bare
# `Ok`/`ErrNullArg`, which would pollute the C namespace.
rename_variants = "QualifiedScreamingSnakeCase"
prefix_with_name = false

[export]
# Keep the surface explicit and ordered for a stable, reviewable diff.
include = ["SsStatus"]
