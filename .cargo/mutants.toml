# Configuration for `cargo xtask check-mutants` (cargo-mutants).
#
# IMPORTANT: cargo-mutants reads its config from `.cargo/mutants.toml` (NOT a root-level
# `mutants.toml`). Keep this file here or the exclusions/timeouts below are silently ignored.
#
# This is a BEST-EFFORT, event-driven gate (see .github/workflows/hygiene.yml), NOT part
# of the required `cargo xtask ci` — like Miri and Kani, it is heavy and deterministic, so
# re-running it on unchanged code proves nothing new and it is never scheduled.
#
# A *surviving* mutant means a line was changed and NO test failed — i.e. dead code or an
# under-asserted test. xPare's oracles (the reference interpreter in
# tests/reference_transform.rs, proptest, the corpus, golden tests) make the score
# high-signal: most product logic should be load-bearing.

# Mutate the product logic only. The xtask tooling is not the product; benches are not
# correctness-bearing. (The `fuzz/` crate is a separate workspace, so it is never seen.)
exclude_globs = [
    "xtask/**",
    "**/benches/**",
]

# Exclude the `#[cfg(kani)]` proof harnesses (the `kani_proofs` module in core/src/config.rs):
# they are compiled/run only under `cargo kani`, so `cargo test` can never cover them and
# every mutation to them "survives" spuriously. The real proof is `cargo xtask check-kani`.
exclude_re = [
    "kani_proofs",
    # The pattern above only matches FUNCTION mutants (their names carry the
    # `kani_proofs::` path). The module-level `const MAX_FACTOR: u64 = 1 +
    # MAX_CONFIG_TEXT_PARAM_BYTES as u64` in the same `#[cfg(kani)]` module surfaces
    # with no containing-function context — just "config.rs:<l>:<c>: replace + with -"
    # — so it needs its own pattern (line/column left out so edits to config.rs do not
    # silently retire it). Same justification: cfg(kani) code never compiles into a
    # test build, so no test can kill it; `cargo xtask check-kani` exercises the bound,
    # and the `max_growth_factor_never_exceeds_the_kani_proof_bound` unit test keeps it
    # in sync with production.
    'config\.rs:\d+:\d+: replace \+ with [-*]$',
    # Confirmed-equivalent mutant (survives because the mutation cannot change
    # observable output — verified by re-mutation + analysis, not assumed):
    # `defang::has_indicator_byte -> true` admits every token to the classifiers, which
    # all require one of its bytes (`.` `@` `:` for a match; `[` `(` only feed the
    # `already_defanged` guard, itself a no-op path), so output is unchanged for every
    # input. Only the always-true direction is excluded: `-> false` and the in-function
    # operator mutants are observable (defang stops defanging) and stay under test, as
    # do all `already_defanged` mutants — its guard is load-bearing for half-defanged
    # tokens the classifiers still match (pinned by
    # `defang_half_defanged_token_is_left_alone`), so its mutants are killable and a
    # blanket exclusion would hide real regressions.
    'replace has_indicator_byte -> bool with true$',
]

# Run the WHOLE workspace's tests against every mutant, not just the mutated package's.
# Part of the kill surface is deliberately cross-package: xtask's structural tripwires
# (`validate_pipeline_zeroization` and the accumulator wipe markers) pin security-posture
# source constructs in `core` — e.g. the wipe-before-growth capacity comparison in
# `prepare_collapse_scratch` — whose zeroize-vs-clear behavior is invisible to any safe
# in-crate assertion. Package-scoped testing would misreport those mutants as MISSED.
test_workspace = true

# Property and corpus tests run longer than a trivial unit test. Give a generous timeout
# so a slow-but-passing test is never misread as a mutant-induced hang (a false survivor).
timeout_multiplier = 5.0
minimum_test_timeout = 60
