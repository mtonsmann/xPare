# Auto-generated release-notes config: GitHub groups merged PRs into these
# categories by label when a release's notes are generated. Unlabeled PRs fall
# through to "Other".
changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Security
      labels:
        - security
    - title: Dependencies
      labels:
        - dependencies
        - ci
    - title: Docs
      labels:
        - documentation
        - docs
    - title: Other
      labels:
        - "*"
