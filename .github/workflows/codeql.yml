# CodeQL security analysis.
#
# Additive signal only: the required local/CI gate remains `cargo xtask ci`.
# Keep this workflow out of branch protection until the first alert baseline has
# been triaged and false positives are understood.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly baseline refresh for newly-added CodeQL queries.
    - cron: "37 9 * * 2"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          languages: rust
          build-mode: none
          queries: security-extended
          dependency-caching: true

      - name: Analyze
        uses: github/codeql-action/analyze@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          category: "/language:rust"

  python-actions:
    name: python + actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          languages: python, actions
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          category: "/language:python-actions"
