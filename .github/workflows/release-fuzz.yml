# xPare release fuzz.
#
# Manually dispatched on a release-candidate ref. The release workflow checks for a
# successful run on the exact tag SHA before it packages or publishes release assets.
name: Release Fuzz
# LOAD-BEARING format: release.yml parses the per-target budget out of this
# display title ("<N>m/target") to enforce the release fuzz budget floor
# (prerelease tags >= 10 minutes/target, final releases >= 30). Keep the
# "(<ref>, <N>m/target)" shape in sync with the gate step in release.yml.
run-name: Release fuzz (${{ github.ref_name }}, ${{ inputs.minutes_per_target }}m/target)

on:
  workflow_dispatch:
    inputs:
      minutes_per_target:
        description: "Minutes per cargo-fuzz target (1-45)."
        required: true
        default: "30"
        type: number

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  release-fuzz:
    name: release fuzz (${{ inputs.minutes_per_target }}m/target)
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Validate fuzz budget
        env:
          MINUTES_PER_TARGET: ${{ inputs.minutes_per_target }}
        run: |
          set -euo pipefail
          if ! [[ "${MINUTES_PER_TARGET}" =~ ^[0-9]+$ ]]; then
            echo "minutes_per_target must be an integer."
            exit 1
          fi
          if (( MINUTES_PER_TARGET < 1 || MINUTES_PER_TARGET > 45 )); then
            echo "minutes_per_target must be between 1 and 45."
            exit 1
          fi
          echo "XP_FUZZ_SMOKE_SECONDS=$(( MINUTES_PER_TARGET * 60 ))" >> "${GITHUB_ENV}"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly

      # Cache-vs-purity tradeoff, decided deliberately: this GATE may reuse
      # cached dependency/fuzz-target builds — its job is to spend the wall-clock
      # budget finding crashes, so build provenance does not matter here and the
      # cache converts setup time into fuzzing time. Shipped artifacts are never
      # produced by this workflow: release.yml builds them cold (no cargo cache)
      # on every run.
      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
            fuzz/target/
          key: ${{ runner.os }}-release-fuzz-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-fuzz-
            ${{ runner.os }}-cargo-

      - name: Run in-depth fuzz
        run: cargo run -p xtask -- check-fuzz

      - name: Upload fuzz corpus and crash artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-fuzz-${{ github.sha }}
          path: |
            fuzz/artifacts/**
            fuzz/corpus/**
          if-no-files-found: ignore
          retention-days: 14
