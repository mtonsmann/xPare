# xPare CI.
#
# The portable gate is `cargo xtask ci` (see xtask/src/main.rs): fmt --check,
# clippy -D warnings, the full test suite, every structural invariant check
# (unsafe-forbid, core-deps allowlist, no-network banlist, content-logging,
# clipboard-safety, frozen ABI header, minimal macOS entitlements), and the external
# linters (shellcheck; actionlint + zizmor for workflows; cargo-deny for the supply
# chain). Running the *same* command in CI as locally keeps the gate honest — a green
# `cargo xtask ci` means a green PR, with no CI-only logic to drift from.
name: CI

on:
  # PRs get the full gate. `push` runs CI only on main (post-merge validation and the
  # push-event status on the protected branch) — feature branches are covered by their
  # pull_request run, so this avoids the duplicate push+PR runs on every PR-branch push.
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Treat warnings as hard errors everywhere (clippy also gets -D warnings below).
  RUSTFLAGS: "-D warnings"

# Least-privilege GITHUB_TOKEN: CI only needs to read the repo. A job that needs
# more (e.g. zizmor's SARIF upload) opts in with its own job-level permissions.
permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------------------
  # Primary gate: the whole portable check suite on Linux.
  # ----------------------------------------------------------------------------
  xtask-ci:
    name: xtask ci (fmt + clippy + test + invariants)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Install the pinned stable toolchain. dtolnay/rust-toolchain honors
      # rust-toolchain.toml's channel; we add clippy + rustfmt explicitly because
      # `cargo xtask ci` shells out to both.
      - name: Install Rust (pinned stable + clippy + rustfmt)
        id: toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      # Cache the cargo registry, git db, and target dir keyed on the toolchain
      # (dtolnay/rust-toolchain's `cachekey` output) plus the lockfile, so a
      # toolchain bump never restores stale incremental artifacts.
      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ steps.toolchain.outputs.cachekey }}-

      # External linters that `cargo xtask ci` shells out to (supply-chain, workflow,
      # shell). Installed here as pinned, PREBUILT binaries so CI stays fast (no
      # from-source compiles) and matches what xtask auto-installs locally. The action
      # is SHA-pinned like every other `uses:` (zizmor's unpinned-uses); Dependabot
      # keeps the SHA current. Keep the tool versions in lockstep with
      # CARGO_DENY_VERSION / ZIZMOR_VERSION / CARGO_MACHETE_VERSION in xtask/src/main.rs.
      # (actionlint is a Go binary, not a crate, so install-action doesn't carry it —
      # see the next step.)
      - name: Install lint tools (cargo-deny, zizmor, shellcheck, cargo-machete)
        uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-deny@0.19.8,zizmor@1.25.2,shellcheck@0.11.0,cargo-machete@0.9.2

      # actionlint from its pinned release tarball, sha256-verified — same supply-chain
      # rigor as the SHA-pinned actions and cargo-deny's own checksum checks. Bump the
      # version AND the checksum together with ACTIONLINT_INSTALL_HINT in
      # xtask/src/main.rs. Checksum from actionlint_1.7.12_checksums.txt.
      - name: Install actionlint (pinned + checksum-verified)
        run: |
          ver=1.7.12
          sha=8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
          tmp="$(mktemp -d)"
          curl --fail --silent --show-error --location \
            --output "${tmp}/actionlint.tar.gz" \
            "https://github.com/rhysd/actionlint/releases/download/v${ver}/actionlint_${ver}_linux_amd64.tar.gz"
          echo "${sha}  ${tmp}/actionlint.tar.gz" | sha256sum --check --strict -
          tar -xzf "${tmp}/actionlint.tar.gz" -C "${tmp}" actionlint
          sudo install -m 0755 "${tmp}/actionlint" /usr/local/bin/actionlint
          actionlint --version

      # Single source of truth: the same command an engineer runs locally. Runs
      # fmt --check, clippy -D warnings, test --workspace, every structural invariant
      # check, then the external linters above (check-shell; check-workflows =
      # actionlint + zizmor; check-supply-chain = cargo-deny). A green run here means a
      # green PR — there is no required check outside this one command.
      # --locked on the OUTER invocation too: a plain `cargo run` would re-sync the
      # root Cargo.lock before xtask's lockfile gate runs, making it vacuous.
      - name: cargo xtask ci
        run: cargo run --locked -p xtask -- ci

  # ----------------------------------------------------------------------------
  # MSRV: the workspace must keep compiling on the minimum supported Rust version
  # declared as `rust-version` in Cargo.toml. `cargo check --locked` is enough —
  # the full gate (tests, lints) runs on pinned stable above; this job only
  # proves the declared floor has not silently risen. Keep the `toolchain:`
  # value in lockstep with `rust-version`.
  # ----------------------------------------------------------------------------
  msrv:
    name: msrv (cargo check on rust-version)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # This job proves the declared floor still COMPILES. Warning sets differ
      # across compiler versions, so don't inherit the workflow-wide
      # `-D warnings` — the pinned-stable gate above already denies warnings.
      RUSTFLAGS: ""
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust 1.85 (MSRV)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # MSRV — see Cargo.toml rust-version
        with:
          toolchain: "1.85"

      - name: cargo check (MSRV)
        run: cargo check --workspace --locked

  # ----------------------------------------------------------------------------
  # Best-effort macOS shell anti-slop tier: `cargo xtask check-swift` builds the FFI
  # staticlib, then runs swift-format lint, `swift test`, and the Sources coverage
  # floor (and SwiftLint if a runner happens to have it). continue-on-error because
  # the CI image may lack full Xcode (the repo ships on Command-Line-Tools-only
  # environments) and the Swift tier is cross-language parity for the §13 Rust gates,
  # not a required gate — the required suite is the Linux `xtask ci` above. check-swift
  # skips cleanly when the Swift toolchain or sources are absent.
  # ----------------------------------------------------------------------------
  macos-shell:
    name: macOS shell anti-slop (swift-format + test + coverage)
    runs-on: macos-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust (pinned stable)
        id: toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Keyed on toolchain + lockfile like the xtask-ci cache above.
      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ steps.toolchain.outputs.cachekey }}-

      # Pinned + sha256-verified SwiftLint (the style/complexity phase of check-swift),
      # installed like actionlint: a release asset from a pinned tag, checksum-checked.
      # `portable_swiftlint.zip` is a universal macOS binary that needs no Xcode to run.
      # Bump VER and SHA together (sha256 of the asset; verify by re-downloading). check-swift
      # runs SwiftLint only if it's on PATH, so this step is what turns that phase on in CI.
      - name: Install SwiftLint (pinned + checksum-verified)
        run: |
          ver=0.63.3
          sha=fb045e85e7cb3374f42a4840b6b85a0106302afa69035c0c6f29af4a44c810b6
          tmp="$(mktemp -d)"
          curl --fail --silent --show-error --location \
            --output "${tmp}/swiftlint.zip" \
            "https://github.com/realm/SwiftLint/releases/download/${ver}/portable_swiftlint.zip"
          echo "${sha}  ${tmp}/swiftlint.zip" | shasum -a 256 --check --strict -
          unzip -o -q "${tmp}/swiftlint.zip" -d "${tmp}/swiftlint"
          sudo install -m 0755 "${tmp}/swiftlint/swiftlint" /usr/local/bin/swiftlint
          swiftlint version

      # Same command an engineer runs locally (`make swift`), so local == CI for the
      # Swift tier too. It builds the staticlib the package links over the frozen C
      # ABI, lints formatting, runs the tests, enforces the Sources coverage floor, and
      # (now that the step above put it on PATH) runs the SwiftLint style/complexity pass.
      - name: cargo xtask check-swift
        run: cargo run -p xtask -- check-swift

  # ----------------------------------------------------------------------------
  # Developer preview artifact: after the required Linux gate is green on protected
  # main, build the runnable macOS bundle and upload a short-retention, explicitly
  # unsigned preview. This is for maintainer/dev testing only; tagged releases remain
  # the user download surface.
  # ----------------------------------------------------------------------------
  main-preview:
    name: main dev preview (unsigned app artifact)
    runs-on: macos-latest
    needs: xtask-ci
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust (pinned stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-main-preview-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Compute preview label
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          echo "PREVIEW_VERSION=0.0.0-main.${short_sha}" >> "${GITHUB_ENV}"

      - name: Package unsigned main preview
        run: make preview VERSION="${PREVIEW_VERSION}"

      - name: Stage unsigned main preview artifact
        run: |
          set -euo pipefail
          mkdir -p dist/main-preview
          cp dist/release/xPare-v"${PREVIEW_VERSION}"-macos-*-unsigned-preview.zip dist/main-preview/
          cp dist/release/xPare-v"${PREVIEW_VERSION}"-macos-*-unsigned-preview.zip.sha256 dist/main-preview/

      - name: Upload unsigned main preview artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xPare-main-${{ github.sha }}-unsigned-preview
          retention-days: 14
          path: dist/main-preview/*

  # ----------------------------------------------------------------------------
  # Nightly fuzz smoke: run each cargo-fuzz target for a few seconds to catch
  # regressions in the never-panics invariant. continue-on-error so a nightly
  # toolchain/libFuzzer hiccup never blocks merges; the property/corpus tests in
  # `cargo xtask ci` are the required signal.
  # ----------------------------------------------------------------------------
  fuzz-smoke:
    name: fuzz smoke (nightly, best-effort)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly

      # `xtask` auto-installs the pinned cargo-fuzz version and discovers every
      # target from `cargo fuzz list`, so this cannot drift when a new fuzz target is
      # added. A short time budget per target keeps this a smoke test, not a fuzzing
      # campaign.
      - name: Run fuzz targets briefly
        env:
          XP_FUZZ_SMOKE_SECONDS: "30"
        run: cargo run -p xtask -- check-fuzz

  # ----------------------------------------------------------------------------
  # Miri: run the core-ffi boundary tests under Miri's undefined-behavior detector.
  # core-ffi is the only crate with `unsafe` (pointer validation, the leaked-Box
  # buffer protocol, zeroize-on-free). continue-on-error so a nightly/Miri hiccup
  # never blocks merges; the required signal is the stable `cargo xtask ci`. Run it
  # locally with `cargo run -p xtask -- check-miri`.
  # ----------------------------------------------------------------------------
  miri:
    name: miri (nightly, best-effort)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust nightly with Miri
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly
          components: miri

      # `xtask` scopes the run to core-ffi (the unsafe crate) and bootstraps the miri
      # component if missing, so this cannot drift and needs no Miri command here.
      - name: Run core-ffi boundary tests under Miri
        run: cargo run -p xtask -- check-miri

  # ----------------------------------------------------------------------------
  # GitHub Actions security: zizmor statically audits the workflow files
  # themselves (template injection, credential persistence, unpinned actions,
  # over-broad token permissions). A required gate — workflow security is part of
  # the posture, like the core invariants. Run it locally with `make zizmor`.
  # ----------------------------------------------------------------------------
  zizmor:
    name: zizmor (workflow security)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      # The zizmor action uploads its findings to GitHub code scanning (SARIF).
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
