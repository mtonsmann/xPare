# xPare release.
#
# Tag-triggered (v*). The `validate` job first requires a successful manual
# Release Fuzz run on the exact tag SHA (budget floor: prerelease >= 10m/target,
# final >= 30m/target — see the gate step), then runs the full gate, builds the
# app bundle, and uploads an explicitly UNSIGNED preview artifact — it needs no
# Apple secrets, so it works on every tag and every fork. `sign-official`
# runs whenever the repo variable XPARE_ENABLE_OFFICIAL_RELEASE == 'true' AND a
# required reviewer approves the `release` environment deployment (the human
# gate sits BEFORE signing, so a stolen tag push cannot mint a signed binary);
# it does NOT silently skip on missing credentials — a validation step FAILS
# the job if any Apple secret is absent. All five Apple secrets live in the
# `release` environment (tag-scoped, approval-gated), not at repo level:
# the Developer ID Application cert (MACOS_CERTIFICATE_P12_BASE64 + _PASSWORD)
# and an App Store Connect API key for notarization (MACOS_NOTARY_KEY_P8_BASE64
# + MACOS_NOTARY_KEY_ID + MACOS_NOTARY_ISSUER_ID — a per-key-revocable,
# Developer-role key; no personal Apple ID credential ever reaches CI). It
# signs with the checked App Sandbox entitlements, notarizes, immediately wipes
# Apple signing/notary material, and encrypts the signed asset handoff before any
# workflow artifact upload. Provenance and SBOM metadata finish before
# `publish-official` decrypts the handoff and creates a complete draft GitHub
# Release once. Signing/notary credentials are NEVER required for pull-request CI
# (see .github/workflows/ci.yml).
name: Release

on:
  push:
    tags:
      - "v*"

# One release run per ref at a time. Never cancel an in-flight release — an
# interrupted sign/notarize/publish could leave a half-published release —
# so queue instead of cancel-in-progress.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: validate + unsigned preview
    # Pinned runner image, NOT macos-latest: this workflow produces the shipped
    # (signed) artifacts, so the Xcode/codesign/notarytool toolchain must not
    # drift silently when GitHub repoints the -latest alias.
    runs-on: macos-15
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          # Full history: package-app.sh derives the bundle build number from
          # `git rev-list --count HEAD`, which is always 1 on a depth-1 clone.
          fetch-depth: 0

      - name: Install Rust (pinned stable + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Verify release entitlements file
        run: cargo run -p xtask -- check-entitlements

      # Fuzz budget policy: a successful Release Fuzz run on the exact tag SHA is
      # required, AND its per-target budget must meet the floor for the release
      # class — prerelease tags (any tag containing '-', e.g. v1.0.0-rc.1) need
      # >= 10 minutes/target; final releases need >= 30 minutes/target. The
      # budget is recovered from the run's display title
      # ("Release fuzz (<ref>, <N>m/target)"), which release-fuzz.yml embeds via
      # `run-name`, so an under-budget run can never satisfy the gate.
      - name: Require release fuzz for this SHA
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          runs_json="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPOSITORY}/actions/workflows/release-fuzz.yml/runs?event=workflow_dispatch&status=success&head_sha=${RELEASE_SHA}&per_page=50")"
          runs_file="${RUNNER_TEMP}/release-fuzz-runs.json"
          printf '%s' "${runs_json}" > "${runs_file}"

          if python3 - "${runs_file}" <<'PY'
          import json
          import os
          import re
          import sys

          with open(sys.argv[1], encoding="utf-8") as fh:
              runs = json.load(fh).get("workflow_runs", [])

          release_sha = os.environ["RELEASE_SHA"]
          ref_name = os.environ["RELEASE_REF_NAME"]
          # Prerelease tags (v1.0.0-rc.1, ...) contain '-'; finals do not.
          required_minutes = 10 if "-" in ref_name else 30

          best = None
          for run in runs:
              if run.get("head_sha") != release_sha or run.get("conclusion") != "success":
                  continue
              match = re.search(r"(\d+)m/target", run.get("display_title") or "")
              if match is None:
                  continue
              minutes = int(match.group(1))
              if best is None or minutes > best[0]:
                  best = (minutes, run.get("html_url"))
              if minutes >= required_minutes:
                  print(
                      f"release-fuzz: found successful {minutes}m/target run "
                      f"(floor for {ref_name}: {required_minutes}m/target): {run.get('html_url')}"
                  )
                  sys.exit(0)

          if best is None:
              print(
                  f"release-fuzz: no successful run with a parseable budget found for {release_sha}",
                  file=sys.stderr,
              )
          else:
              print(
                  f"release-fuzz: best successful run is {best[0]}m/target ({best[1]}), below "
                  f"the {required_minutes}m/target floor for {ref_name}",
                  file=sys.stderr,
              )
          sys.exit(1)
          PY
          then
            echo "Release fuzz gate satisfied for ${RELEASE_SHA}."
          else
            echo "::error::Run the Release Fuzz workflow successfully for this exact SHA with enough per-target budget (prerelease >= 10m, final >= 30m) before releasing."
            echo "Use: gh workflow run release-fuzz.yml --ref ${RELEASE_REF_NAME} -f minutes_per_target=30"
            exit 1
          fi

      - name: Normalize release version
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          if ! [[ "${version}" =~ ^[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
            echo "Release tags must look like vX.Y.Z or vX.Y.Z-<prerelease> (dotted prerelease such as v1.0.0-rc.1 is allowed)."
            exit 1
          fi
          echo "RELEASE_VERSION=${version}" >> "${GITHUB_ENV}"

      # A tag that disagrees with [workspace.package].version would ship an app
      # whose Info.plist / --version contradict the release name. Fail closed
      # before doing any expensive work.
      - name: Assert tag matches workspace version
        run: |
          set -euo pipefail
          workspace_version="$(cargo metadata --no-deps --format-version 1 | python3 -c '
          import json, sys
          packages = json.load(sys.stdin)["packages"]
          print(next(p["version"] for p in packages if p["name"] == "xpare-core"))
          ')"
          if [ "${RELEASE_VERSION}" != "${workspace_version}" ]; then
            echo "::error::Tag v${RELEASE_VERSION} does not match the workspace version ${workspace_version}."
            echo "Bump [workspace.package].version in Cargo.toml to ${RELEASE_VERSION} (or retag at the right commit) before releasing."
            exit 1
          fi
          echo "Tag v${RELEASE_VERSION} matches workspace version ${workspace_version}."

      # External linters that `cargo xtask ci` shells out to (supply-chain,
      # workflow, shell, unused-deps). Mirrors ci.yml: pinned, PREBUILT binaries
      # so the gate below cannot pass vacuously by skipping a missing tool. Keep
      # the versions in lockstep with CARGO_DENY_VERSION / ZIZMOR_VERSION /
      # CARGO_MACHETE_VERSION in xtask/src/main.rs.
      - name: Install lint tools (cargo-deny, zizmor, shellcheck, cargo-machete)
        uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-deny@0.19.8,zizmor@1.25.2,shellcheck@0.11.0,cargo-machete@0.9.2

      # actionlint from its pinned release tarball, sha256-verified — the
      # darwin_arm64 asset (this job runs on the arm64 macos-15 image; ci.yml
      # installs linux_amd64 with its own checksum). Bump the version AND the
      # checksum together with ACTIONLINT_INSTALL_HINT in xtask/src/main.rs.
      # Checksum from actionlint_1.7.12_checksums.txt.
      - name: Install actionlint (pinned + checksum-verified)
        run: |
          ver=1.7.12
          sha=aba9ced2dee8d27fecca3dc7feb1a7f9a52caefa1eb46f3271ea66b6e0e6953f
          tmp="$(mktemp -d)"
          curl --fail --silent --show-error --location \
            --output "${tmp}/actionlint.tar.gz" \
            "https://github.com/rhysd/actionlint/releases/download/v${ver}/actionlint_${ver}_darwin_arm64.tar.gz"
          echo "${sha}  ${tmp}/actionlint.tar.gz" | shasum -a 256 --check --strict -
          tar -xzf "${tmp}/actionlint.tar.gz" -C "${tmp}" actionlint
          sudo install -m 0755 "${tmp}/actionlint" /usr/local/bin/actionlint
          actionlint --version

      # Pinned + sha256-verified SwiftLint, mirroring ci.yml's macos-shell job:
      # `portable_swiftlint.zip` is a universal macOS binary that needs no Xcode
      # to run. Bump ver and sha together.
      - name: Install SwiftLint (pinned + checksum-verified)
        run: |
          ver=0.63.3
          sha=fb045e85e7cb3374f42a4840b6b85a0106302afa69035c0c6f29af4a44c810b6
          tmp="$(mktemp -d)"
          curl --fail --silent --show-error --location \
            --output "${tmp}/swiftlint.zip" \
            "https://github.com/realm/SwiftLint/releases/download/${ver}/portable_swiftlint.zip"
          echo "${sha}  ${tmp}/swiftlint.zip" | shasum -a 256 --check --strict -
          unzip -o -q "${tmp}/swiftlint.zip" -d "${tmp}/swiftlint"
          sudo install -m 0755 "${tmp}/swiftlint/swiftlint" /usr/local/bin/swiftlint
          swiftlint version

      # The same portable gate engineers run locally: fmt + clippy -D warnings +
      # tests + every structural invariant (unsafe-forbid, core-deps, no-network,
      # ABI drift, entitlements, and the ported content-logging / clipboard-safety
      # checks), plus the external linters installed above.
      # --locked on the OUTER invocation too: a plain `cargo run` would re-sync the
      # root Cargo.lock before xtask's lockfile gate runs, making it vacuous.
      - name: cargo xtask ci
        run: cargo run --locked -p xtask -- ci

      - name: Build the Swift shell (release)
        run: |
          cargo build -p xpare-ffi --release
          swift build -c release --package-path shells/macos

      - name: Package unsigned preview
        run: make preview VERSION="${RELEASE_VERSION}"

      - name: Upload unsigned preview artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xPare-${{ github.ref_name }}-unsigned-preview
          path: |
            dist/release/xPare-v${{ env.RELEASE_VERSION }}-macos-*-unsigned-preview.zip
            dist/release/xPare-v${{ env.RELEASE_VERSION }}-macos-*-unsigned-preview.zip.sha256

      - name: Note on official publication
        if: ${{ vars.XPARE_ENABLE_OFFICIAL_RELEASE != 'true' }}
        run: |
          echo "Official GitHub Release publication is disabled."
          echo "Set repo variable XPARE_ENABLE_OFFICIAL_RELEASE=true and add the"
          echo "Apple Developer ID + notary secrets to publish signed assets."

  sign-official:
    name: sign and notarize
    needs: validate
    # The job-level `if` is evaluated BEFORE environment protection, so when the
    # variable is unset (signing not configured) the job skips cleanly without
    # parking a deployment-approval request nobody can satisfy.
    if: ${{ vars.XPARE_ENABLE_OFFICIAL_RELEASE == 'true' }}
    # Approval-gated, tag-scoped home of the five Apple secrets. A required
    # reviewer must approve each run before the secrets resolve — the human gate
    # sits before signing, not just before publishing the draft release.
    environment: release
    # Pinned runner image, NOT macos-latest: this job signs and notarizes the
    # shipped artifacts, so the Xcode/codesign/notarytool toolchain must not
    # drift silently when GitHub repoints the -latest alias.
    runs-on: macos-15
    timeout-minutes: 120
    permissions:
      contents: read
    outputs:
      release_version: ${{ steps.release_version.outputs.version }}
      release_subject_checksums_b64: ${{ steps.signed_manifest.outputs.checksums_b64 }}
      signed_manifest_sha256: ${{ steps.signed_manifest.outputs.sha256 }}
      signed_asset_handoff_artifact_id: ${{ steps.upload_signed_handoff.outputs.artifact-id }}
      signed_asset_handoff_key_hex: ${{ steps.signed_handoff.outputs.key_hex }}
      signed_asset_handoff_iv_hex: ${{ steps.signed_handoff.outputs.iv_hex }}
      signed_asset_handoff_sha256: ${{ steps.signed_handoff.outputs.sha256 }}
    env:
      VERSION: ${{ github.ref_name }}
      NOTARY_PROFILE: xpare-notary
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          # Full history: package-app.sh derives the bundle build number from
          # `git rev-list --count HEAD`, which is always 1 on a depth-1 clone.
          fetch-depth: 0

      - name: Install Rust (pinned stable + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Verify release entitlements file
        run: cargo run -p xtask -- check-entitlements

      - name: Normalize release version
        id: release_version
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          if ! [[ "${version}" =~ ^[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
            echo "Release tags must look like vX.Y.Z or vX.Y.Z-<prerelease> (dotted prerelease such as v1.0.0-rc.1 is allowed)."
            exit 1
          fi
          echo "RELEASE_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      # `runner.temp` is not available in job-level `env:`, so derive the signing
      # paths from $RUNNER_TEMP here and export them for the later steps.
      - name: Prepare signing paths
        run: |
          {
            echo "KEYCHAIN_PATH=${RUNNER_TEMP}/xpare-signing.keychain-db"
            echo "CERTIFICATE_PATH=${RUNNER_TEMP}/developer-id.p12"
            echo "NOTARY_KEY_PATH=${RUNNER_TEMP}/notary-authkey.p8"
            echo "SIGNED_RELEASE_MANIFEST=${RUNNER_TEMP}/signed-release-assets.sha256"
          } >> "${GITHUB_ENV}"

      - name: Validate required Apple secrets
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_NOTARY_KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_KEY_P8_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          for name in \
            MACOS_CERTIFICATE_P12_BASE64 MACOS_CERTIFICATE_PASSWORD \
            MACOS_NOTARY_KEY_P8_BASE64 MACOS_NOTARY_KEY_ID MACOS_NOTARY_ISSUER_ID; do
            if [ -z "${!name}" ]; then echo "Missing required secret: ${name}"; exit 1; fi
          done

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          # Throwaway keychain password: cryptographically random, never derived
          # from predictable run metadata (run_id/run_attempt are public). It
          # guards the imported signing key for this job only and dies with the
          # keychain in the immediate post-dist cleanup step.
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          echo "${MACOS_CERTIFICATE_P12_BASE64}" | base64 -d > "${CERTIFICATE_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${MACOS_CERTIFICATE_PASSWORD}" \
            -t cert -f pkcs12 -k "${KEYCHAIN_PATH}" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          identity="$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | head -n 1)"
          if [ -z "${identity}" ]; then echo "No Developer ID Application identity found."; exit 1; fi
          echo "CERT_NAME=${identity}" >> "${GITHUB_ENV}"

      - name: Store notary credentials
        # App Store Connect API key, not an Apple ID + app-specific password:
        # per-key revocable, immune to interactive 2FA churn, and no personal
        # account credential ever reaches the runner. `store-credentials` wraps
        # the key in the same keychain profile `release.sh dist` already
        # consumes, so the local NOTARY_PROFILE flow is identical. The .p8 stays
        # on disk only until the immediate post-dist cleanup step.
        env:
          MACOS_NOTARY_KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_KEY_P8_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          echo "${MACOS_NOTARY_KEY_P8_BASE64}" | base64 -d > "${NOTARY_KEY_PATH}"
          chmod 0600 "${NOTARY_KEY_PATH}"
          xcrun notarytool store-credentials "${NOTARY_PROFILE}" \
            --key "${NOTARY_KEY_PATH}" \
            --key-id "${MACOS_NOTARY_KEY_ID}" \
            --issuer "${MACOS_NOTARY_ISSUER_ID}" \
            --keychain "${KEYCHAIN_PATH}"

      - name: Sign and notarize (make dist)
        run: make dist VERSION="${RELEASE_VERSION}" CERT_NAME="${CERT_NAME}" NOTARY_PROFILE="${NOTARY_PROFILE}" NOTARY_KEYCHAIN="${KEYCHAIN_PATH}" SIGN_ENTITLEMENTS="${GITHUB_WORKSPACE}/shells/macos/xPare.entitlements"

      - name: Capture signed asset manifest
        id: signed_manifest
        run: |
          set -euo pipefail
          ( cd dist/release && shasum -a 256 -- *.zip *.zip.sha256 SHA256SUMS* ) > "${SIGNED_RELEASE_MANIFEST}"
          manifest_sha="$(shasum -a 256 "${SIGNED_RELEASE_MANIFEST}" | awk '{print $1}')"
          echo "sha256=${manifest_sha}" >> "${GITHUB_OUTPUT}"
          checksums_b64="$(base64 < "${SIGNED_RELEASE_MANIFEST}" | tr -d '\n')"
          echo "checksums_b64=${checksums_b64}" >> "${GITHUB_OUTPUT}"

      - name: Clean temporary signing material
        if: ${{ always() }}
        run: |
          set -euo pipefail
          if [ -e "${KEYCHAIN_PATH}" ]; then
            security delete-keychain "${KEYCHAIN_PATH}"
          fi
          rm -f "${CERTIFICATE_PATH}" "${NOTARY_KEY_PATH}"

      - name: Verify signed assets before encrypted handoff
        env:
          SIGNED_MANIFEST_SHA256: ${{ steps.signed_manifest.outputs.sha256 }}
        run: |
          set -euo pipefail
          expected_manifest_sha="${SIGNED_MANIFEST_SHA256}"
          printf '%s  %s\n' "${expected_manifest_sha}" "${SIGNED_RELEASE_MANIFEST}" | shasum -a 256 --check --strict -
          current_manifest="${RUNNER_TEMP}/signed-release-assets.current.sha256"
          ( cd dist/release && shasum -a 256 -- *.zip *.zip.sha256 SHA256SUMS* ) > "${current_manifest}"
          diff -u "${SIGNED_RELEASE_MANIFEST}" "${current_manifest}"

      - name: Encrypt signed release handoff
        id: signed_handoff
        run: |
          set -euo pipefail
          handoff_dir="${RUNNER_TEMP}/signed-release-handoff"
          rm -rf "${handoff_dir}"
          mkdir -p "${handoff_dir}"
          tarball="${handoff_dir}/signed-release-assets.tar"
          encrypted="${handoff_dir}/signed-release-assets.tar.enc"
          key_hex="$(openssl rand -hex 32)"
          iv_hex="$(openssl rand -hex 16)"
          ( cd dist/release && tar -cf "${tarball}" -- *.zip *.zip.sha256 SHA256SUMS )
          openssl enc -aes-256-cbc -K "${key_hex}" -iv "${iv_hex}" -in "${tarball}" -out "${encrypted}"
          rm -f "${tarball}"
          encrypted_sha="$(shasum -a 256 "${encrypted}" | awk '{print $1}')"
          {
            echo "SIGNED_ASSET_HANDOFF_DIR=${handoff_dir}"
          } >> "${GITHUB_ENV}"
          {
            echo "key_hex=${key_hex}"
            echo "iv_hex=${iv_hex}"
            echo "sha256=${encrypted_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload encrypted signed release handoff
        id: upload_signed_handoff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: encrypted-signed-release-handoff-${{ env.RELEASE_VERSION }}
          path: ${{ env.SIGNED_ASSET_HANDOFF_DIR }}/signed-release-assets.tar.enc
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  attest-official:
    name: attest signed release subjects
    needs: sign-official
    if: ${{ vars.XPARE_ENABLE_OFFICIAL_RELEASE == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      RELEASE_VERSION: ${{ needs['sign-official'].outputs.release_version }}
      RELEASE_SUBJECT_CHECKSUMS_B64: ${{ needs['sign-official'].outputs.release_subject_checksums_b64 }}
    steps:
      - name: Materialize signed subject checksums
        run: |
          set -euo pipefail
          mkdir -p dist/release
          printf '%s' "${RELEASE_SUBJECT_CHECKSUMS_B64}" | base64 -d > dist/release/signed-release-assets.sha256
          test -s dist/release/signed-release-assets.sha256

      # Signed build provenance for everything we ship: a verifier can check that
      # an asset was built by THIS workflow at THIS SHA (`gh attestation verify`).
      # This third-party action runs in a separate job without release write
      # permission and attests the checksum subject list captured before release
      # publication, so it does not need draft-release visibility.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: dist/release/signed-release-assets.sha256

  sbom-official:
    name: generate release SBOM
    needs: validate
    if: ${{ vars.XPARE_ENABLE_OFFICIAL_RELEASE == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      release_sbom_artifact_id: ${{ steps.upload_sbom.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Normalize release version
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if ! [[ "${version}" =~ ^[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
            echo "Release tags must look like vX.Y.Z or vX.Y.Z-<prerelease> (dotted prerelease such as v1.0.0-rc.1 is allowed)."
            exit 1
          fi
          echo "RELEASE_VERSION=${version}" >> "${GITHUB_ENV}"

      # SPDX SBOM of the workspace (syft catalogs the Cargo lockfile), staged
      # as a workflow artifact. This third-party action has no release write
      # permission; a later run-only job creates the draft with exactly this
      # SBOM file already present.
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: xPare-v${{ env.RELEASE_VERSION }}-sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM workflow artifact
        id: upload_sbom
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-sbom-${{ env.RELEASE_VERSION }}
          path: xPare-v${{ env.RELEASE_VERSION }}-sbom.spdx.json
          if-no-files-found: error

  publish-official:
    name: publish complete draft release
    needs:
      - sign-official
      - attest-official
      - sbom-official
    if: ${{ vars.XPARE_ENABLE_OFFICIAL_RELEASE == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      actions: read
    env:
      RELEASE_VERSION: ${{ needs['sign-official'].outputs.release_version }}
      RELEASE_SUBJECT_CHECKSUMS_B64: ${{ needs['sign-official'].outputs.release_subject_checksums_b64 }}
      SIGNED_MANIFEST_SHA256: ${{ needs['sign-official'].outputs.signed_manifest_sha256 }}
      SIGNED_ASSET_HANDOFF_ARTIFACT_ID: ${{ needs['sign-official'].outputs.signed_asset_handoff_artifact_id }}
      SIGNED_ASSET_HANDOFF_KEY_HEX: ${{ needs['sign-official'].outputs.signed_asset_handoff_key_hex }}
      SIGNED_ASSET_HANDOFF_IV_HEX: ${{ needs['sign-official'].outputs.signed_asset_handoff_iv_hex }}
      SIGNED_ASSET_HANDOFF_SHA256: ${{ needs['sign-official'].outputs.signed_asset_handoff_sha256 }}
      RELEASE_SBOM_ARTIFACT_ID: ${{ needs['sbom-official'].outputs.release_sbom_artifact_id }}
    steps:
      - name: Download encrypted signed release handoff
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          artifact_zip="${RUNNER_TEMP}/signed-release-handoff.zip"
          handoff_dir="${RUNNER_TEMP}/signed-release-handoff"
          rm -rf "${handoff_dir}"
          mkdir -p "${handoff_dir}"
          mkdir -p dist/release
          gh api -H "Accept: application/vnd.github+json" "/repos/${GH_REPO}/actions/artifacts/${SIGNED_ASSET_HANDOFF_ARTIFACT_ID}/zip" > "${artifact_zip}"
          unzip -q "${artifact_zip}" -d "${handoff_dir}"
          encrypted="${handoff_dir}/signed-release-assets.tar.enc"
          tarball="${handoff_dir}/signed-release-assets.tar"
          test -s "${encrypted}"
          printf '%s  %s\n' "${SIGNED_ASSET_HANDOFF_SHA256}" "${encrypted}" | shasum -a 256 --check --strict -
          openssl enc -d -aes-256-cbc -K "${SIGNED_ASSET_HANDOFF_KEY_HEX}" -iv "${SIGNED_ASSET_HANDOFF_IV_HEX}" -in "${encrypted}" -out "${tarball}"
          tar -C dist/release -xf "${tarball}"
          rm -f "${tarball}"

      - name: Download release SBOM
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          artifact_zip="${RUNNER_TEMP}/release-sbom.zip"
          sbom_dir="${RUNNER_TEMP}/release-sbom"
          rm -rf "${sbom_dir}"
          mkdir -p "${sbom_dir}"
          gh api -H "Accept: application/vnd.github+json" "/repos/${GH_REPO}/actions/artifacts/${RELEASE_SBOM_ARTIFACT_ID}/zip" > "${artifact_zip}"
          unzip -q "${artifact_zip}" -d "${sbom_dir}"
          sbom="${sbom_dir}/xPare-v${RELEASE_VERSION}-sbom.spdx.json"
          test -s "${sbom}"
          cp "${sbom}" "dist/release/xPare-v${RELEASE_VERSION}-sbom.spdx.json"

      - name: Verify signed assets before release creation
        run: |
          set -euo pipefail
          expected_manifest="${RUNNER_TEMP}/signed-release-assets.expected.sha256"
          printf '%s' "${RELEASE_SUBJECT_CHECKSUMS_B64}" | base64 -d > "${expected_manifest}"
          printf '%s  %s\n' "${SIGNED_MANIFEST_SHA256}" "${expected_manifest}" | shasum -a 256 --check --strict -
          current_manifest="${RUNNER_TEMP}/signed-release-assets.current.sha256"
          ( cd dist/release && shasum -a 256 -- *.zip *.zip.sha256 SHA256SUMS* ) > "${current_manifest}"
          diff -u "${expected_manifest}" "${current_manifest}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Release v${RELEASE_VERSION} already exists; refusing to replace release assets."
            exit 1
          fi
          create_flags=(--draft)
          case "${RELEASE_VERSION}" in
            *-*) create_flags+=(--prerelease) ;;
          esac
          shopt -s nullglob
          zips=(dist/release/xPare-v"${RELEASE_VERSION}"-macos-*.zip)
          if [ "${#zips[@]}" -ne 1 ]; then
            echo "Expected exactly one signed zip for v${RELEASE_VERSION}; found ${#zips[@]}."
            exit 1
          fi
          gh release create "v${RELEASE_VERSION}" \
            "${zips[0]}" \
            "${zips[0]}.sha256" \
            "dist/release/SHA256SUMS" \
            "dist/release/xPare-v${RELEASE_VERSION}-sbom.spdx.json" \
            --title "xPare ${RELEASE_VERSION}" --generate-notes --verify-tag \
            "${create_flags[@]}"
