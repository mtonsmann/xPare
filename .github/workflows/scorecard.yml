# OSSF Scorecard supply-chain security analysis, following the official template
# (https://github.com/ossf/scorecard/blob/main/.github/workflows/scorecard.yml):
# weekly schedule + push to main + branch-protection changes, publish_results to
# the OpenSSF REST API (powers the scorecard badge), and SARIF upload to GitHub
# code scanning so findings land in the Security tab.
name: Scorecard

on:
  # Re-evaluates checks that depend on branch-protection settings.
  branch_protection_rule:
  schedule:
    # Weekly, Tuesday 07:22 UTC.
    - cron: "22 7 * * 2"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  analysis:
    name: scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Upload the SARIF results to GitHub code scanning.
      security-events: write
      # publish_results signs the results with the workflow's OIDC identity so
      # the OpenSSF API can verify they came from this exact workflow.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      # Keep the raw SARIF available for a few days for debugging, per template.
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
