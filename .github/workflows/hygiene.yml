# Quality hygiene (Rust coverage/mutation + macOS shell anti-slop).
#
# This is the best-effort anti-slop lane across the Rust product crates and the
# Swift macOS shell. Rust coverage catches untested code; Rust mutation testing
# catches code that runs but is not asserted on; check-swift gives the shell its
# own lint/test/coverage floor. These checks are HEAVY, platform-bound, or both,
# so they stay outside the required `cargo xtask ci` gate.
#
# The deterministic parts are EVENT-driven, not time-driven: re-running unchanged
# code with pinned tool versions proves nothing new, so a cron would be pure
# waste. The trigger follows the code and tooling that can affect these results,
# plus workflow_dispatch for deliberate full-tree/manual runs. On a stable repo it
# never fires.
#
# Run locally any time: `cargo run -p xtask -- check-coverage` / `check-mutants`
# (`XP_DIFF_BASE=origin/main cargo run -p xtask -- check-mutants` scopes to your diff)
# and `cargo run -p xtask -- check-swift` on macOS.
name: Quality Hygiene

on:
  workflow_dispatch:
  push:
    branches: [main]
    # Event-driven: only the things that can change the result. (Kept in sync with the
    # pull_request paths below — inlined rather than a YAML anchor so zizmor can analyze it.)
    paths:
      - "core/**"
      - "core-ffi/**"
      - "cli/**"
      - "shells/macos/**"
      - "xtask/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/mutants.toml"
      - ".github/workflows/hygiene.yml"
  pull_request:
    paths:
      - "core/**"
      - "core-ffi/**"
      - "cli/**"
      - "shells/macos/**"
      - "xtask/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/mutants.toml"
      - ".github/workflows/hygiene.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Coverage floor (ratchet). Fails if product-code line coverage drops below
  # COVERAGE_FLOOR_PCT (xtask owns the floor + the xtask-tooling exclusion).
  # --------------------------------------------------------------------------
  coverage:
    name: coverage (line-coverage floor, best-effort)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust (pinned stable + llvm-tools)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      # Pinned, prebuilt binary — keep the version in lockstep with
      # CARGO_LLVM_COV_VERSION in xtask/src/main.rs.
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-llvm-cov@0.8.7

      - name: Check coverage floor
        run: cargo run -p xtask -- check-coverage

  # --------------------------------------------------------------------------
  # Mutation testing. PRs scope to the diff vs their base branch; pushes scope to
  # the pushed-over commit. Only a manual workflow_dispatch runs the full tree —
  # at ~900 mutants the full sweep cannot fit the job timeout on a hosted runner,
  # and every commit on protected main already had a diff-scoped run on its PR.
  # A MISSED mutant means dead code or an under-asserted test (timeouts count as
  # detected — see check-mutants in xtask).
  # --------------------------------------------------------------------------
  mutants:
    name: mutants (cargo-mutants, best-effort)
    runs-on: ubuntu-latest
    # Generous: a full-tree mutation run builds and tests the workspace once per
    # mutant; this is the slowest job in the repo by far.
    timeout-minutes: 360
    continue-on-error: true
    steps:
      # Full history so a PR run can diff against its base branch.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Rust (pinned stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Pinned, prebuilt binary — keep the version in lockstep with
      # CARGO_MUTANTS_VERSION in xtask/src/main.rs.
      - name: Install cargo-mutants
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-mutants@27.1.0

      # Make the PR's base branch available for the diff. Passed via env (not inlined
      # into the script) so there is no template-injection surface.
      - name: Fetch PR base
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch --no-tags --depth=1 origin "$BASE_REF"

      # Resolve what XP_DIFF_BASE should be for this event (xtask treats an empty
      # value as unset = full tree). Values flow through env, never inlined into
      # the script, so there is no template-injection surface.
      - name: Resolve mutation scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          base=""
          case "${EVENT_NAME}" in
            pull_request)
              base="origin/${BASE_REF}"
              ;;
            push)
              if [ -n "${PUSH_BEFORE}" ] \
                 && [ "${PUSH_BEFORE}" != "0000000000000000000000000000000000000000" ] \
                 && git cat-file -e "${PUSH_BEFORE}^{commit}" 2>/dev/null; then
                base="${PUSH_BEFORE}"
              elif git rev-parse -q --verify 'HEAD~1^{commit}' >/dev/null 2>&1; then
                # Force-push or unfetchable before-SHA: the pushed head's first
                # parent still scopes the run to what just landed.
                base="HEAD~1"
              fi
              ;;
            *)
              # workflow_dispatch: deliberate full-tree run, no time pressure.
              base=""
              ;;
          esac
          echo "Mutation scope base: ${base:-<full tree>}"
          echo "XP_DIFF_BASE=${base}" >> "${GITHUB_ENV}"

      - name: Run mutation testing
        run: cargo run -p xtask -- check-mutants

  # --------------------------------------------------------------------------
  # macOS shell anti-slop. `check-swift` builds the FFI staticlib, then runs
  # swift-format, swift test, a Sources-only coverage floor, and SwiftLint when it
  # is installed. macOS runner/toolchain availability should not block ordinary
  # merges, so this stays best-effort like the Rust quality jobs above.
  # --------------------------------------------------------------------------
  macos-shell:
    name: macOS shell anti-slop (swift-format + test + coverage)
    runs-on: macos-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust (pinned stable)
        id: toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Keyed on toolchain + lockfile like the CI cache.
      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ steps.toolchain.outputs.cachekey }}-

      # Pinned + sha256-verified SwiftLint (the style/complexity phase of check-swift),
      # installed like actionlint: a release asset from a pinned tag, checksum-checked.
      # `portable_swiftlint.zip` is a universal macOS binary that needs no Xcode to run.
      # Bump VER and SHA together (sha256 of the asset; verify by re-downloading). check-swift
      # runs SwiftLint only if it's on PATH, so this step is what turns that phase on in CI.
      - name: Install SwiftLint (pinned + checksum-verified)
        run: |
          ver=0.63.3
          sha=fb045e85e7cb3374f42a4840b6b85a0106302afa69035c0c6f29af4a44c810b6
          tmp="$(mktemp -d)"
          curl --fail --silent --show-error --location \
            --output "${tmp}/swiftlint.zip" \
            "https://github.com/realm/SwiftLint/releases/download/${ver}/portable_swiftlint.zip"
          echo "${sha}  ${tmp}/swiftlint.zip" | shasum -a 256 --check --strict -
          unzip -o -q "${tmp}/swiftlint.zip" -d "${tmp}/swiftlint"
          sudo install -m 0755 "${tmp}/swiftlint/swiftlint" /usr/local/bin/swiftlint
          swiftlint version

      # Same command an engineer runs locally (`make swift`), so local == CI for
      # the Swift tier too. It builds the staticlib the package links over the
      # frozen C ABI, lints formatting, runs the tests, enforces the Sources
      # coverage floor, and runs the SwiftLint style/complexity pass.
      - name: cargo xtask check-swift
        run: cargo run -p xtask -- check-swift
