# Keep the SHA-pinned GitHub Actions current. The workflows pin every action to a
# full commit SHA (with a `# vX.Y.Z` comment) so zizmor's `unpinned-uses` stays
# clean and a moved tag can't change what runs. Dependabot understands that pin
# format and bumps both the hash and the comment, so pinning doesn't rot.
#
# Only the github-actions ecosystem is managed here on purpose: Rust dependencies
# are governed by the strict core-deps allowlist (cargo xtask check-core-deps) and
# are updated deliberately, not automatically.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"
